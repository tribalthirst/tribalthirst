name: Azure Static Web Apps CI/CD

on:
  push:
    branches:
      - main
    paths-ignore:
    - 'api/**'
    - 'api.test/**'
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches:
      - main
    paths-ignore:
      - 'api/**'
      - 'api.test/**'

jobs:
  build_and_deploy_job:
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    runs-on: ubuntu-latest
    name: Build and Deploy Job
    steps:
      - uses: actions/checkout@v3
        with:
          submodules: true
          lfs: false

      - name: Install Dart Sass
        run: |
          curl -fsSL https://github.com/sass/dart-sass/releases/download/1.69.5/dart-sass-1.69.5-linux-x64.tar.gz | tar -xz
          echo "$GITHUB_WORKSPACE/dart-sass" >> $GITHUB_PATH

      - name: Install Hugo (extended)
        run: |
          curl -fsSL https://github.com/gohugoio/hugo/releases/download/v0.161.1/hugo_extended_0.161.1_linux-amd64.tar.gz | tar -xz
          sudo mv hugo /usr/local/bin/hugo

      - name: Build Hugo site
        working-directory: src
        run: hugo --minify

      - name: Build And Deploy
        id: builddeploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_THANKFUL_SAND_03F957810 }}
          repo_token: ${{ secrets.GITHUB_TOKEN }} # Used for Github integrations (i.e. PR comments)
          action: "upload"
          ###### Repository/Build Configurations - These values can be configured to match your app requirements. ######
          # For more information regarding Static Web App workflow configurations, please visit: https://aka.ms/swaworkflowconfig
          app_location: "src/public" # Pre-built output directory
          skip_app_build: true
          ###### End of Repository/Build Configurations ######
